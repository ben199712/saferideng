{% extends "layouts/base.html" %}

{% block title %}Delete Emergency Contact • SafeRide NG{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="rounded-[2rem] border border-red-200 bg-white p-6 md:p-8 shadow-soft">
    <div class="w-16 h-16 rounded-full bg-red-50 text-red-700 flex items-center justify-center mb-5">
      <span class="material-symbols-outlined text-4xl">delete</span>
    </div>
    <h1 class="text-3xl font-bold text-primary tracking-[-0.02em]">Delete Emergency Contact?</h1>
    <p class="text-sm text-on-surface-variant mt-3">This will permanently remove <strong>{{ contact.full_name }}</strong> from your emergency contact list.</p>

    <form method="post" class="flex flex-col sm:flex-row gap-3 mt-8">
      {% csrf_token %}
      <button type="submit" class="inline-flex flex-1 items-center justify-center rounded-xl bg-[#DC2626] px-5 py-3 text-white font-semibold hover:bg-red-700 transition active:scale-[0.98]">Delete Contact</button>
      <a href="{% url 'emergency_contact_list' %}" class="inline-flex items-center justify-center rounded-xl border border-outline-variant/60 bg-white px-5 py-3 text-primary font-semibold hover:bg-surface-container-low transition">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
