<div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 mb-8">
  <div>
    <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-blue-50 text-blue-700 border border-blue-100 text-xs font-semibold mb-4">
      <span class="material-symbols-outlined text-[16px]">security</span>
      {{ eyebrow|default:"SafeRide NG" }}
    </div>
    <h1 class="text-3xl md:text-4xl font-bold text-primary tracking-[-0.02em] leading-tight">{{ title }}</h1>
    {% if subtitle %}
      <p class="text-sm md:text-base text-on-surface-variant mt-3 max-w-2xl">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% if action_url %}
    <a href="{{ action_url }}" class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-[#2563EB] hover:bg-[#1d4ed8] text-white font-semibold shadow-sm hover:shadow-md transition active:scale-[0.98]">
      {% if action_icon %}<span class="material-symbols-outlined text-[18px]">{{ action_icon }}</span>{% endif %}
      {{ action_label }}
    </a>
  {% endif %}
</div>
