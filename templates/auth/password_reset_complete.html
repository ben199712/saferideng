{% extends "layouts/base.html" %}
{% block title %}Password Reset Complete • SafeRide NG{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <div class="rounded-[2rem] border border-outline-variant/40 bg-white p-8 shadow-soft text-center">
    <div class="w-16 h-16 rounded-full bg-green-50 text-green-700 flex items-center justify-center mx-auto mb-5">
      <span class="material-symbols-outlined text-4xl">check_circle</span>
    </div>
    <h2 class="text-3xl font-bold text-primary tracking-[-0.02em]">Password reset complete</h2>
    <p class="text-sm text-on-surface-variant mt-3 max-w-md mx-auto">Your password has been updated. You can now sign in with the new password.</p>
    <div class="mt-8">
      <a href="{% url 'login' %}" class="inline-flex items-center justify-center rounded-xl bg-[#2563EB] px-5 py-3 text-white font-semibold shadow-sm hover:bg-[#1d4ed8] transition active:scale-[0.98]">
        Sign in
      </a>
    </div>
  </div>
</div>
{% endblock %}
